services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: shelternav
      POSTGRES_USER: shelternav
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelternav"]
      interval: 5s
      timeout: 3s
      retries: 5

  geo-service:
    build:
      context: .
      dockerfile: geo-service/Dockerfile
    environment:
      DATABASE_URL: postgres://shelternav:${POSTGRES_PASSWORD:-dev}@postgres:5432/shelternav
      LISTEN_ADDR: 0.0.0.0:9001
    ports:
      - "9001:9001"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    environment:
      GEO_SERVICE_ADDR: geo-service:9001
      LISTEN_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    depends_on:
      - geo-service

volumes:
  pgdata:
