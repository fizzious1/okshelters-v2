<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ShelterNav</title>

    <!-- MapLibre GL JS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

    <!-- Inter font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f3e0;</text></svg>">
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>

    <!-- Search bar -->
    <div id="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search shelters..." autocomplete="off" spellcheck="false">
        <button id="search-clear" class="search-clear hidden" aria-label="Clear search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Floating action buttons -->
    <div id="fab-container">
        <button id="fab-locate" class="fab" aria-label="My location" title="My location">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
            </svg>
        </button>
        <button id="fab-nearest" class="fab fab-primary" aria-label="Find nearest shelter" title="Find nearest shelter">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
            </svg>
        </button>
    </div>

    <!-- Bottom sheet panel -->
    <div id="shelter-panel">
        <div id="panel-drag-handle">
            <div class="drag-bar"></div>
        </div>
        <div id="panel-header">
            <span id="panel-summary">Loading shelters...</span>
        </div>
        <div id="panel-content">
            <div id="shelter-list"></div>
        </div>
    </div>

    <!-- Navigation overlay -->
    <div id="nav-overlay" class="hidden">
        <div id="nav-top-bar">
            <button id="nav-back" aria-label="Exit navigation">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <span class="nav-label">NAVIGATING</span>
            <span id="nav-eta" class="nav-eta"></span>
        </div>
        <div id="nav-maneuver" class="hidden">
            <div class="maneuver-instruction" id="maneuver-text"></div>
            <div class="maneuver-distance" id="maneuver-distance"></div>
        </div>
        <div id="nav-destination">
            <div id="nav-dest-name"></div>
            <div id="nav-dest-info"></div>
        </div>
    </div>

    <!-- Connection status banner -->
    <div id="connection-status" class="hidden">
        <span class="status-dot"></span>
        <span class="status-text">Demo Mode — Using sample data</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
